**2. edit.html**

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Booking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h3>Edit Booking</h3>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-3"><input class="form-control" name="name" value="{{ booking.Name }}" required></div>
            <div class="col-md-3"><input class="form-control" name="email" value="{{ booking.Email }}" required></div>
            <div class="col-md-3"><input class="form-control" name="team" value="{{ booking.Team }}" required></div>
            <div class="col-md-3"><input class="form-control" name="title" value="{{ booking.Title }}" required></div>
            <div class="col-md-3">
                <select class="form-select" name="room" required>
                    <option {{ 'selected' if booking.Room == 'Conference Room' }}>Conference Room</option>
                    <option {{ 'selected' if booking.Room == 'Meeting Room' }}>Meeting Room</option>
                </select>
            </div>
            <div class="col-md-3"><input type="date" class="form-control" name="date" value="{{ booking.Date }}" required></div>
            <div class="col-md-3"><input type="time" class="form-control" name="time" value="{{ booking.Time }}" required></div>
            <div class="col-md-3"><input class="form-control" name="duration" value="{{ booking.Duration }}" required></div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
```
